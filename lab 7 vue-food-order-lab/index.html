<!DOCTYPE html>
<html>
<head>
    <title>MyCampus Cafe Order System</title>
</head>
<body>
<div id="app">

    <h1>MyCampus Cafe Menu</h1>

    <form @submit.prevent="addMenu">

        <input 
            v-model="newMenu.menu_name"
            placeholder="Menu Name"
            required
        >

        <br><br>

        <input
            v-model="newMenu.category"
            placeholder="Category"
            required
        >

        <br><br>

        <input
            v-model="newMenu.price"
            type="number"
            step="0.01"
            placeholder="Price"
            required
        >

        <br><br>

        <select v-model="newMenu.availability">

            <option>Available</option>
            <option>Unavailable</option>

        </select>

        <br><br>

        <button type="submit">
            Add Menu
        </button>

    </form>

    <hr>

    <div
        v-for="item in menuItems"
        :key="item.menu_id"
        style="border:1px solid black; padding:10px; margin:10px;"
    >

        <h3>{{ item.menu_name }}</h3>

        <p>Category: {{ item.category }}</p>

        <p>Price: RM {{ item.price }}</p>

        <p>Status: {{ item.availability }}</p>

        <button @click="updateMenu(item)">
            Update
        </button>

        <button @click="deleteMenu(item.menu_id)">
            Delete
        </button>



    </div>

</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script src="app.js"></script>
</body>
</html>
